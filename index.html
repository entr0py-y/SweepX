<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#080808" />
  <title>SweepX — Clean it. Earn it.</title>
  <link rel="icon" href="data:," />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script>
    // dvh fallback for older mobile browsers
    function setAppHeight() {
      document.documentElement.style.setProperty('--app-height', window.innerHeight + 'px');
    }
    window.addEventListener('resize', setAppHeight);
    window.addEventListener('orientationchange', function () { setTimeout(setAppHeight, 100); });
    setAppHeight();
  </script>
</head>

<body>
  <div class="desktop-canvas">
    <div id="phone" class="app-shell" data-theme="home">
      <!-- Global dark background — behind all screens -->
      <div class="global-bg">
        <div class="bg-orb bg-orb-1"></div>
        <div class="bg-orb bg-orb-2"></div>
        <div class="bg-orb bg-orb-3"></div>
        <div class="bg-orb bg-orb-4"></div>
        <div class="bg-orb bg-orb-5"></div>
        <div class="bg-grain"></div>
      </div>
      <div class="status-bar">
        <span class="sb-time" id="sb-time-main"></span>
        <div class="sb-pill"></div>
        <div class="sb-icons">
          <svg viewBox="0 0 24 24">
            <path d="M2 16.2C2 10.3 6.8 5.5 12.7 5.5c1.7 0 3.3.4 4.8 1.1" />
            <path d="M6.7 19.5c1.4-1.4 3.4-2.3 5.6-2.3s4.2.9 5.6 2.3" />
            <path d="M4.3 17c2-2 4.7-3.2 7.7-3.2s5.7 1.2 7.7 3.2" />
            <circle cx="12.3" cy="22" r="1" />
          </svg>
          <svg viewBox="0 0 24 24">
            <rect x="1" y="6" width="3" height="12" rx="1" />
            <rect x="6" y="4" width="3" height="14" rx="1" />
            <rect x="11" y="2" width="3" height="16" rx="1" />
            <rect x="16" y="5" width="3" height="13" rx="1" />
          </svg>
          <svg viewBox="0 0 28 14">
            <rect x="0" y="0" width="24" height="14" rx="3" stroke="currentColor" stroke-width="1.5" fill="none" />
            <rect x="25" y="4" width="2" height="6" rx="1" fill="currentColor" opacity=".4" />
            <rect x="2" y="2" width="18" height="10" rx="1.5" fill="currentColor" />
          </svg>
        </div>
      </div>
      <div class="app-inner" id="screen-area">
        <div id="s-auth" class="scr"></div>
        <div id="s-home" class="scr"></div>
        <div id="s-missions" class="scr"></div>
        <div id="s-report" class="scr"></div>
        <div id="s-detail" class="scr"></div>
        <div id="s-leaderboard" class="scr"></div>
        <div id="s-profile" class="scr"></div>
      </div>
      <nav id="bnav" style="display:none">
        <button class="nt" data-tab="home" onclick="go('home')"><svg viewBox="0 0 24 24">
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
            <polyline points="9,22 9,12 15,12 15,22" />
          </svg><span class="nt-l">Home</span></button>
        <button class="nt" data-tab="missions" onclick="go('missions')"><svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10" />
            <polyline points="12,6 12,12 16,14" />
          </svg><span class="nt-l">Missions</span></button>
        <div class="fab-wrap"><button class="fab" data-tab="report" onclick="go('report')"><span class="fab-plus">+</span></button></div>
        <button class="nt" data-tab="leaderboard" onclick="go('leaderboard')"><svg viewBox="0 0 24 24">
            <path d="M18 20V10M12 20V4M6 20v-6" />
          </svg><span class="nt-l">Ranks</span></button>
        <button class="nt" data-tab="profile" onclick="go('profile')"><svg viewBox="0 0 24 24">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg><span class="nt-l">Profile</span></button>
      </nav>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="config.js"></script>
  <script src="supabase.js"></script>
  <script src="services.js"></script>
  <script src="app.js"></script>
  <script src="test-connection.js"></script>
</body>
</html>
