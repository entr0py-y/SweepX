<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#080808" />
  <title>SweepX — Clean it. Earn it.</title>
  <link rel="icon" href="data:," />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script>
    // dvh fallback for older mobile browsers
    function setAppHeight() {
      document.documentElement.style.setProperty('--app-height', window.innerHeight + 'px');
    }
    window.addEventListener('resize', setAppHeight);
    window.addEventListener('orientationchange', function () { setTimeout(setAppHeight, 100); });
    setAppHeight();
  </script>
</head>

<body>
  <div class="desktop-canvas">
    <div id="phone" class="app-shell" data-theme="home">
      <!-- Global dark background — behind all screens -->
      <div class="global-bg">
        <div class="bg-orb bg-orb-1"></div>
        <div class="bg-orb bg-orb-2"></div>
        <div class="bg-orb bg-orb-3"></div>
        <div class="bg-orb bg-orb-4"></div>
        <div class="bg-orb bg-orb-5"></div>
        <div class="bg-grain"></div>
      </div>
      <div class="app-inner" id="screen-area">
        <div id="s-auth" class="scr"></div>
        <div id="s-home" class="scr"></div>
        <div id="s-missions" class="scr"></div>
        <div id="s-report" class="scr"></div>
        <div id="s-detail" class="scr"></div>
        <div id="s-leaderboard" class="scr"></div>
        <div id="s-profile" class="scr"></div>
      </div>
      <nav id="bnav" style="display:none">
        <button class="nt" data-tab="home" onclick="go('home')"><svg viewBox="0 0 24 24">
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
            <polyline points="9,22 9,12 15,12 15,22" />
          </svg><span class="nt-l">Home</span></button>
        <button class="nt" data-tab="missions" onclick="go('missions')"><svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10" />
            <polyline points="12,6 12,12 16,14" />
          </svg><span class="nt-l">Missions</span></button>
        <div class="fab-wrap"><button class="fab" data-tab="report" onclick="go('report')"><span class="fab-plus">+</span></button></div>
        <button class="nt" data-tab="leaderboard" onclick="go('leaderboard')"><svg viewBox="0 0 24 24">
            <path d="M18 20V10M12 20V4M6 20v-6" />
          </svg><span class="nt-l">Ranks</span></button>
        <button class="nt" data-tab="profile" onclick="go('profile')"><svg viewBox="0 0 24 24">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg><span class="nt-l">Profile</span></button>
      </nav>
    </div>
  </div>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  
  <!-- Camera Modal (hidden by default) -->
  <div id="camera-modal" style="display:none; position:absolute; inset:0; background:#000; z-index:200; flex-direction:column;">
    <div style="position:relative; flex:1; overflow:hidden;">
      <video id="camera-preview" autoplay playsinline muted style="width:100%; height:100%; object-fit:cover;"></video>

      <!-- Viewfinder overlay -->
      <div style="position:absolute; inset:0; pointer-events:none;">
        <div style="position:absolute; top:20%; left:10%; width:80%; height:60%; border:2px solid rgba(180,255,0,0.5); border-radius:12px;"></div>
      </div>

      <!-- Instruction text -->
      <div style="position:absolute; bottom:100px; left:0; right:0; text-align:center; color:rgba(255,255,255,0.7); font-size:13px; padding:0 24px;">
        Point camera at the garbage location
      </div>
    </div>

    <!-- Bottom controls -->
    <div style="height:120px; display:flex; align-items:center; justify-content:space-between; padding:0 40px; background:#000;">
      <button id="camera-cancel" style="width:44px; height:44px; background:none; border:none; color:#fff; font-size:14px; cursor:pointer;">Cancel</button>
      <button id="camera-shutter" style="width:72px; height:72px; border-radius:50%; background:#fff; border:4px solid rgba(255,255,255,0.3); cursor:pointer; transition:transform 80ms ease;"></button>
      <button id="camera-flip" style="width:44px; height:44px; background:none; border:none; color:#fff; cursor:pointer;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M1 4v6h6M23 20v-6h-6"/>
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/>
        </svg>
      </button>
    </div>

    <!-- Hidden canvas for frame capture -->
    <canvas id="camera-canvas" style="display:none;"></canvas>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="config.js"></script>
  <script src="supabase.js"></script>
  <script src="services.js"></script>
  <script src="app.js"></script>
  <script src="test-connection.js"></script>
</body>
</html>
